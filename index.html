<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution Adventure Pro - Andri Purnama, S.Pd.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            aspect-ratio: 20 / 9;
            width: 100vw;
            max-width: 1200px;
            max-height: 540px;
            overflow: hidden;
            border: 4px solid #333;
            background: #001f3f;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .ui-panel {
            position: absolute;
            top: 10px;
            pointer-events: none;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .btn-game {
            background: rgba(0,0,0,0.7);
            border: 2px solid #fff;
            color: #fff;
            padding: 8px 12px;
            pointer-events: auto;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        /* Mobile Controls Styling */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 20;
        }

        .control-group {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            touch-action: none;
            backdrop-filter: blur(5px);
        }

        .touch-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.9);
        }

        /* Modals */
        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2c3e50;
            padding: 30px;
            border: 4px solid #f1c40f;
            z-index: 100;
            width: 85%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .quiz-option {
            display: block;
            width: 100%;
            text-align: center;
            margin: 12px 0;
            background: #34495e;
            padding: 15px;
            font-size: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            color: white;
        }

        #overlay-start, #overlay-credit {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        @media (min-width: 1024px) {
            #mobile-controls { display: none; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="overlay-start">
            <h1 class="text-2xl mb-4 text-yellow-400 text-center">EVOLUTION ADVENTURE</h1>
            <p class="text-[8px] mb-8 text-center text-gray-400">Created by: Andri Purnama, S.Pd.</p>
            <button onclick="startGame()" class="btn-game px-8 py-4 text-sm">MULAI PETUALANGAN</button>
        </div>

        <!-- Credit Screen -->
        <div id="overlay-credit" style="display: none;">
            <h1 class="text-xl mb-4 text-green-400">EVOLUSI TUNTAS!</h1>
            <p class="text-[10px] mb-2">Terima kasih telah bermain</p>
            <p class="text-[12px] text-yellow-400 mb-8">Karya: Andri Purnama, S.Pd.</p>
            <button onclick="location.reload()" class="btn-game px-6 py-3">MAIN LAGI</button>
        </div>

        <!-- Exit Confirmation -->
        <div id="exit-modal" class="modal">
            <h2 class="text-xs mb-6">MENU KELUAR</h2>
            <button onclick="resetToMenu()" class="quiz-option">KEMBALI KE AWAL GAME</button>
            <button onclick="closeExitModal()" class="quiz-option">LANJUTKAN BERMAIN</button>
        </div>

        <!-- UI Bar -->
        <div class="ui-panel">
            <div id="stats" class="text-[9px] leading-relaxed">
                TAHAP: <span id="stage-name" class="text-yellow-400">AMOEBA</span><br>
                DNA: <span id="score-val">0</span>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleMusic()" id="music-btn" class="btn-game">MUSIC: OFF</button>
                <button onclick="toggleFullscreen()" class="btn-game">FULL</button>
                <button onclick="showExitModal()" class="btn-game">EXIT</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <div class="control-group">
                <div id="btn-left" class="touch-btn">←</div>
                <div id="btn-right" class="touch-btn">→</div>
            </div>
            <div class="control-group">
                <div id="btn-jump" class="touch-btn">↑</div>
            </div>
        </div>

        <!-- Quiz Modal -->
        <div id="quiz-modal" class="modal">
            <h2 id="quiz-title" class="text-yellow-400 mb-4 text-[10px]">MUTASI GENETIK</h2>
            <p id="quiz-question" class="mb-6 text-[9px] leading-relaxed"></p>
            <div id="quiz-options"></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const stageEl = document.getElementById('stage-name');
        const quizModal = document.getElementById('quiz-modal');
        const exitModal = document.getElementById('exit-modal');
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');

        const GAME_WIDTH = 1200;
        const GAME_HEIGHT = 540;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const SPEED = 6;

        let score = 0;
        let gameActive = false;
        let quizActive = false;
        let cameraX = 0;
        let frameCount = 0;
        let lastCheckpointX = 100;

        const STAGES = [
            { name: "AMOEBA", scale: 1, color: "rgba(155, 89, 182, 0.8)" },
            { name: "IKAN", scale: 1.1, color: "#3498db" },
            { name: "KOMODO", scale: 1.2, color: "#27ae60" },
            { name: "ORANGUTAN", scale: 1.3, color: "#d35400" },
            { name: "MANUSIA", scale: 1.4, color: "#f39c12" }
        ];

        let currentStageIdx = 0;

        const player = {
            x: 100,
            y: 300,
            width: 40,
            height: 40,
            velX: 0,
            velY: 0,
            grounded: false,
            jumpCount: 0,
            dir: 1
        };

        const keys = {};

        // Keyboard Handlers
        window.addEventListener('keydown', e => {
            if ((e.code === 'ArrowUp' || e.code === 'Space') && gameActive && !quizActive) {
                handleJump();
            }
            keys[e.code] = true;
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Mobile Touch Handlers
        function handleJump() {
            if (player.grounded) {
                player.velY = JUMP_FORCE;
                player.grounded = false;
                player.jumpCount = 1;
            } else if (player.jumpCount < 2) {
                player.velY = JUMP_FORCE * 0.9;
                player.jumpCount = 2;
            }
        }

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnJump = document.getElementById('btn-jump');

        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
        btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowLeft'] = false; });
        
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
        btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowRight'] = false; });
        
        btnJump.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (gameActive && !quizActive) handleJump(); 
        });

        const questions = [
            {
                q: "Adaptasi 'use and disuse' dikemukakan oleh...",
                a: ["Lamarck", "Darwin", "Wallace", "Mendel"],
                correct: 0
            },
            {
                q: "p^2 + 2pq + q^2 = 1. Angka 2pq melambangkan...",
                a: ["Homozigot Dominan", "Heterozigot", "Homozigot Resesif", "Mutasi"],
                correct: 1
            },
            {
                q: "Contoh organ vestigial (sisa) pada manusia adalah...",
                a: ["Mata", "Tulang Ekor", "Gigi Seri", "Kuku"],
                correct: 1
            },
            {
                q: "Apakah Game Edukasi Ini Seru?",
                a: ["IYA", "TIDAK"],
                correct: 0,
                isFinal: true
            }
        ];

        const platforms = [
            {x: 0, y: 480, w: 5000, h: 60},
            {x: 400, y: 350, w: 200, h: 20},
            {x: 750, y: 300, w: 200, h: 20},
            {x: 1100, y: 250, w: 250, h: 20},
            {x: 1500, y: 350, w: 300, h: 20},
            {x: 2000, y: 280, w: 200, h: 20},
            {x: 2400, y: 380, w: 500, h: 20},
            {x: 3200, y: 300, w: 250, h: 20},
            {x: 3600, y: 380, w: 400, h: 20},
            {x: 4200, y: 350, w: 300, h: 20}
        ];

        let dnas = [];
        for(let i=0; i<45; i++) {
            dnas.push({ x: 350 + (i*110), y: 150 + Math.sin(i*0.8)*130, collected: false });
        }

        const gates = [
            {x: 950, y: 380, solved: false, qIdx: 0},
            {x: 1950, y: 380, solved: false, qIdx: 1},
            {x: 3050, y: 280, solved: false, qIdx: 2},
            {x: 4300, y: 250, solved: false, qIdx: 3}
        ];

        const predators = [
            {type: 'dino', x: 2450, y: 330, w: 60, h: 50, startX: 2400, platW: 500, speed: 2.5, dir: 1},
            {type: 'dino', x: 3700, y: 330, w: 60, h: 50, startX: 3600, platW: 400, speed: 3, dir: 1},
            {type: 'bird', x: 1200, y: 150, w: 50, h: 30, speed: 2, range: 400},
            {type: 'bird', x: 2800, y: 100, w: 50, h: 30, speed: 2.5, range: 400},
            {type: 'bird', x: 4000, y: 150, w: 50, h: 30, speed: 3, range: 500}
        ];

        function drawPlayer() {
            const s = STAGES[currentStageIdx];
            const px = player.x - cameraX;
            const py = player.y;
            const w = player.width * s.scale;
            const h = player.height * s.scale;
            const moveAnim = Math.sin(frameCount * 0.15);
            const walkAnim = Math.sin(frameCount * 0.2);

            ctx.save();
            ctx.translate(px + w/2, py + h/2);
            if (player.dir === -1) ctx.scale(-1, 1);
            ctx.translate(-(px + w/2), -(py + h/2));

            if (s.name === "AMOEBA") {
                ctx.fillStyle = s.color;
                ctx.beginPath();
                for(let i=0; i<8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const r = (w/2) + Math.sin(frameCount * 0.1 + i) * 6;
                    ctx.lineTo(px + w/2 + Math.cos(angle) * r, py + h/2 + Math.sin(angle) * r);
                }
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = "rgba(0,0,0,0.2)";
                ctx.beginPath(); ctx.arc(px + w/2 + moveAnim*3, py + h/2, 6, 0, Math.PI*2); ctx.fill();
            } 
            else if (s.name === "IKAN") {
                ctx.fillStyle = s.color;
                ctx.beginPath(); ctx.ellipse(px + w/2, py + h/2, w/2 + 5, h/3, 0, 0, Math.PI*2); ctx.fill();
                const tailWave = Math.sin(frameCount * 0.25) * 12;
                ctx.beginPath(); ctx.moveTo(px+5, py+h/2); ctx.lineTo(px-15, py+h/2-12+tailWave); ctx.lineTo(px-15, py+h/2+12+tailWave); ctx.fill();
                ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(px+w-10, py+h/2-5, 3, 0, Math.PI*2); ctx.fill();
            }
            else if (s.name === "KOMODO") {
                ctx.fillStyle = s.color; ctx.fillRect(px+5, py+h/3, w-10, h/2);
                ctx.fillRect(px+w-15, py+h/4, 20, h/3);
                const leg = walkAnim * 8;
                ctx.fillRect(px+10, py+h/2+5, 6, 8+leg); ctx.fillRect(px+w-20, py+h/2+5, 6, 8-leg);
            }
            else if (s.name === "ORANGUTAN") {
                ctx.fillStyle = "#5d4037"; 
                ctx.fillRect(px+5, py+5, w-10, h-5); 
                ctx.fillStyle = "#8d6e63"; 
                ctx.fillRect(px+8, py, w-16, 15); 
                const arm = walkAnim * 15;
                ctx.fillStyle = "#3e2723";
                ctx.fillRect(px-8, py+10+arm, 12, h*0.9);
                ctx.fillRect(px+w-4, py+10-arm, 12, h*0.9);
                ctx.fillStyle = "#2b1d0e";
                ctx.fillRect(px+w-15, py+5, 12, 12);
            }
            else if (s.name === "MANUSIA") {
                ctx.shadowBlur = 25; ctx.shadowColor = "#f1c40f";
                ctx.fillStyle = "#ffe0b2"; 
                ctx.fillRect(px+w/4, py+h/4, w/2, h/2);
                ctx.fillRect(px+w/3, py, w/3, h/4);
                const step = walkAnim * 12;
                ctx.fillStyle = "#1a237e"; 
                ctx.fillRect(px+w/4, py+h*0.7, 8, 15+step); ctx.fillRect(px+w/2, py+h*0.7, 8, 15-step);
                ctx.fillStyle = "#ffe0b2";
                ctx.fillRect(px+w/8, py+h/4+step/2, 6, h/3); ctx.fillRect(px+w*0.7, py+h/4-step/2, 6, h/3);
            }
            ctx.restore();
        }

        function drawPredators() {
            predators.forEach(p => {
                const px = p.x - cameraX;
                ctx.save();
                if (p.type === 'dino') {
                    ctx.fillStyle = "#1b5e20";
                    ctx.fillRect(px, p.y, p.w, p.h);
                    ctx.fillStyle = "red";
                    ctx.fillRect(px + (p.dir === 1 ? p.w-12 : 4), p.y + 10, 8, 8);
                } else {
                    ctx.translate(px + p.w/2, p.y + p.h/2);
                    const wingWave = Math.sin(frameCount * 0.3) * 20;
                    ctx.fillStyle = "#37474f";
                    ctx.beginPath(); ctx.ellipse(0, 0, p.w/2, p.h/2, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#263238";
                    ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-20, -wingWave); ctx.lineTo(-30, 0); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(5, 0); ctx.lineTo(20, -wingWave); ctx.lineTo(30, 0); ctx.fill();
                }
                ctx.restore();
            });
        }

        function drawWorld() {
            platforms.forEach(p => {
                ctx.fillStyle = "#3e2723";
                ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
                ctx.fillStyle = "#2e7d32";
                ctx.fillRect(p.x - cameraX, p.y, p.w, 12);
            });

            dnas.forEach(d => {
                if (!d.collected) {
                    const hover = Math.sin(frameCount * 0.1) * 8;
                    ctx.fillStyle = "#f1c40f";
                    ctx.beginPath(); ctx.arc(d.x - cameraX, d.y + hover, 8, 0, Math.PI*2); ctx.fill();
                }
            });

            gates.forEach(g => {
                ctx.fillStyle = g.solved ? "#2ecc71" : "#f39c12";
                ctx.fillRect(g.x - cameraX, g.y, 60, 100);
            });
        }

        function update() {
            if (!gameActive || quizActive) return;
            frameCount++;

            if (keys['ArrowRight']) { player.velX = SPEED; player.dir = 1; }
            else if (keys['ArrowLeft']) { player.velX = -SPEED; player.dir = -1; }
            else player.velX *= 0.85;

            player.velY += GRAVITY;
            player.x += player.velX;
            player.y += player.velY;

            const targetCam = player.x - 400;
            cameraX += (targetCam - cameraX) * 0.1;
            if (cameraX < 0) cameraX = 0;

            player.grounded = false;
            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x &&
                    player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.velY > 0 && player.y + player.height < p.y + 25) {
                        player.y = p.y - player.height;
                        player.velY = 0;
                        player.grounded = true;
                        player.jumpCount = 0;
                    }
                }
            });

            predators.forEach(p => {
                if (p.type === 'dino') {
                    p.x += p.speed * p.dir;
                    if (p.x < p.startX || p.x + p.w > p.startX + p.platW) p.dir *= -1;
                } else {
                    const dist = Math.hypot(player.x - p.x, player.y - p.y);
                    if (dist < p.range) {
                        p.x += (player.x - p.x) * 0.02;
                        p.y += (player.y - p.y) * 0.02;
                    }
                }
                if (Math.abs(player.x - p.x) < 30 && Math.abs(player.y - p.y) < 30) respawn();
            });

            dnas.forEach(d => {
                if (!d.collected && Math.abs(player.x - d.x) < 40 && Math.abs(player.y - d.y) < 40) {
                    d.collected = true;
                    score += 20;
                    scoreEl.innerText = score;
                }
            });

            gates.forEach(g => {
                if (!g.solved && player.x > g.x && player.x < g.x + 50) openQuiz(g);
            });

            if (player.y > GAME_HEIGHT) respawn();
        }

        function respawn() {
            player.x = lastCheckpointX;
            player.y = 300;
            player.velX = 0;
            player.velY = 0;
            player.jumpCount = 0;
        }

        function openQuiz(gate) {
            quizActive = true;
            const q = questions[gate.qIdx];
            document.getElementById('quiz-title').innerText = q.isFinal ? "UMPAN BALIK" : "MUTASI GENETIK";
            document.getElementById('quiz-question').innerText = q.q;
            const optionsBox = document.getElementById('quiz-options');
            optionsBox.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (idx === q.correct) {
                        gate.solved = true;
                        lastCheckpointX = gate.x;
                        if (q.isFinal) finishGame();
                        else evolve();
                        closeQuiz();
                    } else {
                        player.x -= 120;
                        closeQuiz();
                    }
                };
                optionsBox.appendChild(btn);
            });
            quizModal.style.display = 'block';
        }

        function closeQuiz() {
            quizActive = false;
            quizModal.style.display = 'none';
        }

        function evolve() {
            if (currentStageIdx < STAGES.length - 1) {
                currentStageIdx++;
                stageEl.innerText = STAGES[currentStageIdx].name;
                score += 200;
                scoreEl.innerText = score;
            }
        }

        function finishGame() {
            gameActive = false;
            document.getElementById('overlay-credit').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('overlay-start').style.display = 'none';
            gameActive = true;
            loop();
        }

        function showExitModal() {
            gameActive = false;
            exitModal.style.display = 'block';
        }

        function closeExitModal() {
            gameActive = true;
            exitModal.style.display = 'none';
            loop();
        }

        function resetToMenu() { location.reload(); }

        function toggleMusic() {
            if (bgMusic.paused) { bgMusic.play(); musicBtn.innerText = "MUSIC: ON"; }
            else { bgMusic.pause(); musicBtn.innerText = "MUSIC: OFF"; }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function loop() {
            if (!gameActive && !quizActive && exitModal.style.display === 'none') return;
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            drawWorld();
            drawPredators();
            drawPlayer();
            update();
            if (gameActive || quizActive) requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
