<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution Adventure Pro - Andri Purnama, S.Pd.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            aspect-ratio: 20 / 9;
            width: 100vw;
            height: auto;
            max-height: 100vh;
            overflow: hidden;
            border: 2px solid #333;
            background: #050b1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .ui-panel {
            position: absolute;
            top: 5%;
            pointer-events: none;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 3%;
            z-index: 10;
        }

        .btn-game {
            background: rgba(0,0,0,0.7);
            border: 2px solid #fff;
            color: #fff;
            padding: 8px 12px;
            pointer-events: auto;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(6px, 1.5vw, 10px);
            transition: all 0.2s;
            border-radius: 4px;
        }

        .btn-game:hover {
            background: #fff;
            color: #000;
        }

        #mobile-controls {
            position: absolute;
            bottom: 8%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            pointer-events: none;
            z-index: 20;
        }

        .control-group {
            display: flex;
            gap: clamp(10px, 3vw, 30px);
            pointer-events: auto;
        }

        .touch-btn {
            width: clamp(55px, 13vw, 90px);
            height: clamp(55px, 13vw, 90px);
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: clamp(12px, 3vw, 20px);
            backdrop-filter: blur(4px);
        }

        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a2a3a;
            padding: 25px;
            border: 4px solid #f1c40f;
            z-index: 100;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .quiz-option {
            display: block;
            width: 100%;
            text-align: center;
            margin: 10px 0;
            background: #2c3e50;
            padding: 15px;
            font-size: 10px;
            border: 2px solid #34495e;
            cursor: pointer;
            color: white;
            font-family: 'Press Start 2P', cursive;
        }

        .quiz-option:hover {
            background: #34495e;
            border-color: #f1c40f;
        }

        #overlay-start, #overlay-credit {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, #0a192f 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
            text-align: center;
        }

        #overlay-credit h1 {
            line-height: 1.6;
            font-size: 14px;
        }

        @media (pointer: fine) { #mobile-controls { display: none; } }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="overlay-start">
            <h1 class="mb-4 text-yellow-400">EVOLUTION ADVENTURE</h1>
            <p class="mb-8 text-gray-400">Created by: Andri Purnama, S.Pd.</p>
            <button onclick="startGame()" class="btn-game px-8 py-4 text-sm">MULAI EVOLUSI</button>
        </div>

        <div id="overlay-credit" style="display: none;">
            <h1 class="text-green-400 mb-4 uppercase">SELAMAT ANDA TELAH BEREVOLUSI MENJADI MAKHLUK SEMPURNA YANG BERAKAL</h1>
            <p id="final-feedback" class="mb-8 text-[10px] text-gray-300"></p>
            <button onclick="location.reload()" class="btn-game px-6 py-3">MAIN LAGI</button>
        </div>

        <div id="exit-modal" class="modal">
            <h2 class="text-red-500 mb-6 text-[12px]">PAUSE / EXIT</h2>
            <p class="text-[9px] mb-6 text-gray-300">Pilih tindakan selanjutnya:</p>
            <button onclick="resetToMenu()" class="quiz-option">KEMBALI KE MENU UTAMA</button>
            <button onclick="closeExitModal()" class="quiz-option" style="border-color: #27ae60;">LANJUTKAN BERMAIN</button>
        </div>

        <div class="ui-panel">
            <div id="stats" class="text-[8px] sm:text-[10px] leading-relaxed">
                <span class="text-gray-400">TAHAP:</span> <span id="stage-name" class="text-yellow-400">AMOEBA</span><br>
                <span class="text-gray-400">DNA:</span> <span id="score-val">0</span>
            </div>
            <div class="flex gap-2 pointer-events-auto">
                <button onclick="toggleMusic()" id="music-btn" class="btn-game">MUSIC: OFF</button>
                <button onclick="toggleFullscreen()" class="btn-game">FULL</button>
                <button onclick="showExitModal()" class="btn-game" style="border-color: #e74c3c; color: #e74c3c;">EXIT</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls">
            <div class="control-group">
                <div id="btn-left" class="touch-btn">←</div>
                <div id="btn-right" class="touch-btn">→</div>
            </div>
            <div class="control-group">
                <div id="btn-jump" class="touch-btn">LOMPAT</div>
            </div>
        </div>

        <div id="quiz-modal" class="modal">
            <h2 id="quiz-title" class="text-yellow-400 mb-4 text-[10px]">CEK PEMAHAMAN</h2>
            <p id="quiz-question" class="mb-6 text-[9px] leading-relaxed"></p>
            <div id="quiz-options"></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const stageEl = document.getElementById('stage-name');
        const quizModal = document.getElementById('quiz-modal');
        const quizTitle = document.getElementById('quiz-title');
        const exitModal = document.getElementById('exit-modal');
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        const container = document.getElementById('game-container');

        const GAME_WIDTH = 1200;
        const GAME_HEIGHT = 540;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const SPEED = 6;

        let score = 0;
        let gameActive = false;
        let quizActive = false;
        let isPaused = false;
        let cameraX = 0;
        let frameCount = 0;
        let lastCheckpointX = 100;

        const STAGES = [
            { name: "AMOEBA", scale: 0.8, color: "#9b59b2", secondary: "#8e44ad" },
            { name: "IKAN", scale: 1.0, color: "#3498db", secondary: "#2980b9" },
            { name: "KOMODO", scale: 1.1, color: "#27ae60", secondary: "#1e8449" },
            { name: "ORANGUTAN", scale: 1.2, color: "#d35400", secondary: "#a04000" },
            { name: "MANUSIA", scale: 1.3, color: "#f39c12", secondary: "#d68910" }
        ];

        let currentStageIdx = 0;

        const player = {
            x: 100, y: 300, width: 40, height: 40,
            velX: 0, velY: 0, grounded: false, jumpCount: 0, dir: 1, rotation: 0
        };

        const keys = {};
        window.addEventListener('keydown', e => {
            if ((e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') && gameActive && !quizActive && !isPaused) handleJump();
            keys[e.code] = true;
            if (e.code === 'Escape') showExitModal();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function handleJump() {
            if (player.grounded) {
                player.velY = JUMP_FORCE;
                player.grounded = false;
                player.jumpCount = 1;
            } else if (player.jumpCount < 2) {
                player.velY = JUMP_FORCE * 0.85;
                player.jumpCount = 2;
            }
        }

        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnJump = document.getElementById('btn-jump');
        btnLeft.onpointerdown = () => keys['ArrowLeft'] = true;
        btnLeft.onpointerup = () => keys['ArrowLeft'] = false;
        btnRight.onpointerdown = () => keys['ArrowRight'] = true;
        btnRight.onpointerup = () => keys['ArrowRight'] = false;
        btnJump.onpointerdown = () => { if (gameActive && !quizActive && !isPaused) handleJump(); };

        const questions = [
            { q: "Apa faktor utama seleksi alam menurut Darwin?", a: ["Mutasi Buatan", "Lingkungan", "Keinginan Individu", "Teknologi"], correct: 1 },
            { q: "Persamaan p^2 + 2pq + q^2 digunakan untuk populasi yang...", a: ["Punah", "Bermutasi Tinggi", "Setimbang (Hardy-Weinberg)", "Terisolasi"], correct: 2 },
            { q: "Sayap burung dan tangan manusia adalah contoh...", a: ["Homologi", "Analogi", "Vestigial", "Fosil"], correct: 0 },
            { q: "Evolusi adalah proses perubahan yang berlangsung secara...", a: ["Instan", "Satu Dekade", "Bertahap & Lama", "Tidak Terjadi"], correct: 2 },
            { q: "Apakah Game Edukasi Ini Seru?", a: ["IYA", "TIDAK"], correct: 0, isFinal: true }
        ];

        const platforms = [
            {x: 0, y: 480, w: 6000, h: 60},
            {x: 400, y: 350, w: 200, h: 20},
            {x: 750, y: 300, w: 200, h: 20},
            {x: 1100, y: 250, w: 250, h: 20},
            {x: 1500, y: 380, w: 300, h: 20},
            {x: 2000, y: 300, w: 200, h: 20},
            {x: 2400, y: 400, w: 500, h: 20},
            {x: 3200, y: 320, w: 250, h: 20},
            {x: 3600, y: 400, w: 400, h: 20},
            {x: 4200, y: 350, w: 300, h: 20},
            {x: 4800, y: 300, w: 300, h: 20},
            {x: 5400, y: 400, w: 600, h: 20}
        ];

        let dnas = [];
        function initDNA() {
            dnas = [];
            for(let i=0; i<60; i++) {
                dnas.push({ x: 350 + (i*100), y: 150 + Math.sin(i*0.8)*140, collected: false });
            }
        }
        initDNA();

        const gates = [
            {x: 950, y: 300, solved: false, qIdx: 0},
            {x: 1950, y: 220, solved: false, qIdx: 1},
            {x: 3050, y: 220, solved: false, qIdx: 2},
            {x: 4100, y: 270, solved: false, qIdx: 3},
            {x: 5500, y: 320, solved: false, qIdx: 4}
        ];

        const predators = [
            {type: 'bat', x: 950, y: 50, w: 80, h: 50, speed: 4, range: 350, originY: 50, angle: 0, state: 'waiting'},
            {type: 'spider', x: 2450, y: 340, w: 80, h: 50, startX: 2400, platW: 500, speed: 2.2, dir: 1, state: 'patrol'},
            {type: 'spider', x: 4850, y: 240, w: 80, h: 50, startX: 4800, platW: 300, speed: 2.8, dir: 1, state: 'patrol'}
        ];

        function drawPlayer() {
            const s = STAGES[currentStageIdx];
            const px = player.x - cameraX;
            const py = player.y;
            const w = player.width * s.scale;
            const h = player.height * s.scale;

            ctx.save();
            const targetRotation = (player.velY * 0.05) * player.dir;
            player.rotation += (targetRotation - player.rotation) * 0.1;
            
            ctx.translate(px + w/2, py + h/2);
            ctx.rotate(player.rotation);
            if (player.dir === -1) ctx.scale(-1, 1);
            
            ctx.fillStyle = s.color;
            ctx.strokeStyle = s.secondary;
            ctx.lineWidth = 2;

            switch(s.name) {
                case "AMOEBA":
                    ctx.beginPath();
                    for(let i=0; i<12; i++) {
                        const r = (w/2) + Math.sin(frameCount*0.1 + i)*5;
                        const a = (i/12)*Math.PI*2;
                        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                    }
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                    ctx.beginPath(); ctx.arc(-5, -5, 6, 0, Math.PI*2); ctx.fill();
                    break;

                case "IKAN":
                    ctx.beginPath(); ctx.ellipse(0, 0, w/2+8, h/3, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.strokeStyle = "rgba(255,255,255,0.3)";
                    ctx.lineWidth = 1;
                    for(let i=-15; i<=15; i+=8) {
                        ctx.beginPath(); ctx.moveTo(i, -h/4); ctx.lineTo(i-5, h/4); ctx.stroke();
                    }
                    const tailSwingI = Math.sin(frameCount*0.2) * 12;
                    ctx.fillStyle = s.secondary;
                    ctx.strokeStyle = s.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(-w/2, 0); ctx.lineTo(-w/2-25, -18 + tailSwingI); ctx.lineTo(-w/2-25, 18 + tailSwingI); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, -h/3); ctx.lineTo(-15, -h/3-10); ctx.lineTo(-25, -h/3); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(w/2-5, -5, 5, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(w/2-5, -5, 2.5, 0, Math.PI*2); ctx.fill();
                    break;

                case "KOMODO":
                    const tongueLength = Math.abs(Math.sin(frameCount*0.2)) * 15;
                    ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(w/2+10, 5); ctx.lineTo(w/2+10+tongueLength, 5); ctx.stroke();
                    ctx.beginPath(); ctx.roundRect(-w/2, -h/4, w, h/2, 8); ctx.fill(); ctx.stroke();
                    ctx.strokeStyle = "rgba(0,0,0,0.2)";
                    for(let i=-w/2+10; i<w/2-10; i+=10) {
                        ctx.beginPath(); ctx.moveTo(i, -h/4); ctx.lineTo(i, h/4); ctx.stroke();
                    }
                    ctx.beginPath(); ctx.ellipse(w/2+2, -2, 18, 14, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    const tailSwingK = Math.sin(frameCount*0.1) * 15;
                    ctx.fillStyle = s.color;
                    ctx.beginPath(); ctx.moveTo(-w/2, 0); ctx.quadraticCurveTo(-w/2-30, tailSwingK, -w/2-50, tailSwingK/2); ctx.lineTo(-w/2, 10); ctx.fill(); ctx.stroke();
                    const walkK = Math.sin(frameCount*0.15) * 12;
                    ctx.fillStyle = s.secondary;
                    ctx.fillRect(-w/2 + 5, h/4, 8, 12 + walkK); ctx.fillRect(w/2 - 15, h/4, 8, 12 - walkK);
                    break;

                case "ORANGUTAN":
                    const armSwingO = Math.sin(frameCount*0.1) * 20;
                    const walkO = player.grounded && Math.abs(player.velX) > 0 ? Math.sin(frameCount*0.15)*12 : 0;
                    // Tubuh & Kepala
                    ctx.fillStyle = s.color;
                    ctx.beginPath(); ctx.roundRect(-w/2.5, -h/1.5, w/1.2, h/1.2, 12); ctx.fill(); ctx.stroke(); 
                    ctx.beginPath(); ctx.arc(0, -h/1.5-15, 22, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    // Mata, Hidung, Mulut (Wajah)
                    ctx.fillStyle = "#ffccbc"; ctx.beginPath(); ctx.ellipse(0, -h/1.5-12, 14, 16, 0, 0, Math.PI*2); ctx.fill(); // Area wajah
                    ctx.fillStyle = "#000";
                    ctx.beginPath(); ctx.arc(-5, -h/1.5-18, 2, 0, Math.PI*2); ctx.fill(); // Mata L
                    ctx.beginPath(); ctx.arc(5, -h/1.5-18, 2, 0, Math.PI*2); ctx.fill(); // Mata R
                    ctx.beginPath(); ctx.arc(0, -h/1.5-12, 1.5, 0, Math.PI*2); ctx.fill(); // Hidung
                    ctx.strokeStyle = "#4e342e"; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(-5, -h/1.5-6); ctx.quadraticCurveTo(0, -h/1.5-4, 5, -h/1.5-6); ctx.stroke(); // Mulut
                    // Tangan
                    ctx.strokeStyle = s.secondary; ctx.lineWidth = 10; ctx.lineCap = "round";
                    ctx.beginPath(); ctx.moveTo(-w/3, -h/2.5); ctx.lineTo(-w/2-15, -10 + armSwingO); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(w/3, -h/2.5); ctx.lineTo(w/2+15, -10 - armSwingO); ctx.stroke();
                    // Kaki (Berdiri Tegak)
                    ctx.beginPath(); ctx.moveTo(-w/5, h/4); ctx.lineTo(-w/5, h/2 + walkO); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(w/5, h/4); ctx.lineTo(w/5, h/2 - walkO); ctx.stroke();
                    break;

                case "MANUSIA":
                    const walkM = player.grounded && Math.abs(player.velX) > 0 ? Math.sin(frameCount*0.15) * 15 : 0;
                    ctx.fillStyle = "#ffcc80"; 
                    ctx.strokeStyle = "#333";
                    ctx.lineWidth = 2;
                    // Kaki (Berdiri Tegak di Tanah)
                    ctx.lineWidth = 8; ctx.lineCap = "round";
                    ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-10, 40 + walkM); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(10, 40 - walkM); ctx.stroke();
                    // Badan
                    ctx.fillStyle = "#3498db";
                    ctx.beginPath(); ctx.roundRect(-15, -50, 30, 55, 5); ctx.fill(); ctx.stroke();
                    // Tangan
                    ctx.strokeStyle = "#ffcc80"; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.moveTo(-15, -45); ctx.lineTo(-25, -15 + walkM/2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(15, -45); ctx.lineTo(25, -15 - walkM/2); ctx.stroke();
                    // Kepala
                    ctx.lineWidth = 2; ctx.fillStyle = "#ffcc80";
                    ctx.beginPath(); ctx.arc(0, -70, 18, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#4a2c2a"; ctx.beginPath(); ctx.arc(0, -78, 18, Math.PI, 0); ctx.fill();
                    ctx.fillStyle = "#000";
                    ctx.beginPath(); ctx.arc(-6, -70, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(6, -70, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(-5, -62); ctx.quadraticCurveTo(0, -59, 5, -62); ctx.stroke();
                    break;
            }
            ctx.restore();
        }

        function drawPredators() {
            predators.forEach(p => {
                const px = p.x - cameraX;
                const py = p.y;
                ctx.save();
                ctx.translate(px + p.w/2, py + p.h/2);
                if (p.dir === -1) ctx.scale(-1, 1);
                
                if (p.type === 'spider') {
                    const walkPhase = frameCount * 0.15;
                    ctx.strokeStyle = "#1a0d00"; ctx.lineWidth = 4;
                    for(let i=0; i<4; i++) {
                        const phaseOffset = i * (Math.PI / 2);
                        const lift = Math.sin(walkPhase + phaseOffset) * 10;
                        const reach = Math.cos(walkPhase + phaseOffset) * 8;
                        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-20 - (i*5) + reach, -15 - lift); ctx.lineTo(-35 - (i*5) + reach, 25); ctx.stroke();
                    }
                    ctx.fillStyle = "#2b1b12";
                    ctx.beginPath(); ctx.ellipse(-15, 0, 25, 18, Math.PI/10, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#1a110a";
                    ctx.beginPath(); ctx.ellipse(10, 2, 15, 12, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#ff0000";
                    ctx.shadowBlur = 8; ctx.shadowColor = "#ff0000";
                    ctx.beginPath(); ctx.arc(18, -2, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(14, -4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (p.type === 'bat') {
                    const wingFlap = (p.state === 'waiting') ? Math.sin(frameCount * 0.05) * 0.2 : Math.sin(frameCount * 0.3) * 0.8;
                    ctx.fillStyle = "#0d0d0d";
                    for (let s = -1; s <= 1; s += 2) {
                        ctx.save(); ctx.scale(s, 1); ctx.rotate(wingFlap);
                        ctx.beginPath(); ctx.moveTo(5, 0); ctx.bezierCurveTo(20, -40, 50, -30, 60, 5); ctx.lineTo(45, 15);
                        ctx.quadraticCurveTo(35, 5, 25, 15); ctx.quadraticCurveTo(15, 5, 5, 15); ctx.closePath(); ctx.fill();
                        ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(5,0); ctx.lineTo(45, -25); ctx.stroke();
                        ctx.restore();
                    }
                    ctx.fillStyle = "#1a1a1a"; ctx.beginPath(); ctx.ellipse(0, 5, 12, 18, 0, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(0, -10, 10, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(-8, -15); ctx.lineTo(-12, -28); ctx.lineTo(-2, -18); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(8, -15); ctx.lineTo(12, -28); ctx.lineTo(2, -18); ctx.fill();
                    ctx.fillStyle = "#ff0000"; ctx.shadowBlur = 10; ctx.shadowColor = "#f00";
                    ctx.beginPath(); ctx.arc(-4, -12, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(4, -12, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                    if (p.state === 'attacking') { ctx.fillStyle = "#f00"; ctx.font = "bold 16px Arial"; ctx.fillText("!", -5, -40); }
                }
                ctx.restore();
            });
        }

        function drawWorld() {
            const grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            grad.addColorStop(0, "#050b1a"); grad.addColorStop(1, "#1a2a3a");
            ctx.fillStyle = grad; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            platforms.forEach(p => {
                ctx.fillStyle = "#2c1e14"; ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
                ctx.fillStyle = "#2e7d32"; ctx.fillRect(p.x - cameraX, p.y, p.w, 8);
            });

            dnas.forEach(d => {
                if (!d.collected) {
                    ctx.save();
                    ctx.fillStyle = "#f1c40f";
                    ctx.shadowBlur = 15; ctx.shadowColor = "#f1c40f";
                    ctx.beginPath(); ctx.arc(d.x - cameraX, d.y + Math.sin(frameCount*0.1)*5, 6, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            });

            gates.forEach(g => {
                if (!g.solved) {
                    const py = g.y + Math.sin(frameCount*0.05)*10;
                    const glow = 15 + Math.sin(frameCount * 0.1) * 10;
                    
                    ctx.save();
                    // Glow Effect
                    ctx.shadowBlur = glow;
                    ctx.shadowColor = "#f39c12";
                    
                    // Portal Frame
                    ctx.strokeStyle = "#f39c12";
                    ctx.lineWidth = 4;
                    ctx.setLineDash([10, 5]);
                    ctx.lineDashOffset = -frameCount;
                    ctx.strokeRect(g.x - cameraX - 5, py - 5, 70, 70);
                    
                    // Core Box
                    ctx.setLineDash([]);
                    ctx.fillStyle = "rgba(243, 156, 18, 0.2)";
                    ctx.fillRect(g.x - cameraX, py, 60, 60);
                    ctx.fillStyle = "#f39c12";
                    ctx.beginPath(); ctx.roundRect(g.x - cameraX + 5, py + 5, 50, 50, 8); ctx.fill();
                    
                    // Question Mark
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 30px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText("?", g.x - cameraX + 30, py + 42);
                    ctx.restore();
                }
            });
        }

        function update() {
            if (!gameActive || quizActive || isPaused) return;
            frameCount++;
            if (keys['ArrowRight'] || keys['KeyD']) { player.velX = SPEED; player.dir = 1; }
            else if (keys['ArrowLeft'] || keys['KeyA']) { player.velX = -SPEED; player.dir = -1; }
            else player.velX *= 0.85;
            player.velY += GRAVITY; player.x += player.velX; player.y += player.velY;
            cameraX += (player.x - 300 - cameraX) * 0.08;
            if (cameraX < 0) cameraX = 0;
            player.grounded = false;
            platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.width > p.x &&
                    player.y < p.y + p.h && player.y + player.height > p.y) {
                    if (player.velY > 0 && player.y + player.height < p.y + 20) {
                        player.y = p.y - player.height; player.velY = 0; player.grounded = true; player.jumpCount = 0;
                    }
                }
            });
            predators.forEach(p => {
                const dist = Math.hypot(player.x - p.x, player.y - p.y);
                if (p.type === 'bat') {
                    if (p.state === 'waiting') {
                        if (dist < p.range) p.state = 'attacking';
                        p.y = p.originY + Math.sin(frameCount * 0.05) * 15;
                    } else if (p.state === 'attacking') {
                        p.x += (player.x - p.x) * 0.04; p.y += (player.y - p.y) * 0.04;
                        p.dir = player.x > p.x ? 1 : -1;
                        if (dist > p.range + 100) p.state = 'waiting';
                    }
                } else if (p.type === 'spider') {
                    p.x += p.speed * p.dir;
                    if (p.x < p.startX + 20) p.dir = 1;
                    if (p.x > p.startX + p.platW - 100) p.dir = -1;
                }
                if (dist < 45) respawn();
            });
            dnas.forEach(d => {
                if (!d.collected && Math.abs(player.x-d.x)<40 && Math.abs(player.y-d.y)<40) {
                    d.collected = true; score += 25; scoreEl.innerText = score;
                }
            });
            gates.forEach(g => {
                if (!g.solved && Math.abs(player.x-g.x)<50 && Math.abs(player.y-g.y)<100) openQuiz(g);
            });
            if (player.y > GAME_HEIGHT) respawn();
        }

        function respawn() {
            player.x = lastCheckpointX; player.y = 300; player.velX = 0; player.velY = 0;
            predators.forEach(p => { if(p.type === 'bat') { p.x = 950; p.y = 50; p.state = 'waiting'; }});
        }

        function showExitModal() { if (!gameActive || quizActive) return; isPaused = true; exitModal.style.display = 'block'; }
        function closeExitModal() { isPaused = false; exitModal.style.display = 'none'; }
        function resetToMenu() { location.reload(); }

        function openQuiz(gate) {
            quizActive = true;
            const q = questions[gate.qIdx];
            quizTitle.innerText = q.isFinal ? "UMPAN BALIK" : "CEK PEMAHAMAN";
            document.getElementById('quiz-question').innerText = q.q;
            const box = document.getElementById('quiz-options');
            box.innerHTML = '';
            q.a.forEach((opt, idx) => {
                const b = document.createElement('button'); b.className = 'quiz-option'; b.innerText = opt;
                b.onclick = () => {
                    if (q.isFinal) { gate.solved = true; finishGame(opt); quizActive = false; quizModal.style.display = 'none'; }
                    else if (idx === q.correct) { gate.solved = true; lastCheckpointX = gate.x; evolve(); quizActive = false; quizModal.style.display = 'none'; }
                    else { player.x -= 150; quizActive = false; quizModal.style.display = 'none'; }
                };
                box.appendChild(b);
            });
            quizModal.style.display = 'block';
        }

        function evolve() {
            if (currentStageIdx < STAGES.length - 1) {
                currentStageIdx++; stageEl.innerText = STAGES[currentStageIdx].name;
                score += 500; scoreEl.innerText = score;
            }
        }

        function finishGame(feedback) {
            gameActive = false;
            document.getElementById('final-feedback').innerText = "Terima kasih telah bermain!";
            document.getElementById('overlay-credit').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('overlay-start').style.display = 'none';
            gameActive = true; loop();
        }

        function toggleMusic() {
            if (bgMusic.paused) { bgMusic.play(); musicBtn.innerText = "MUSIC: ON"; }
            else { bgMusic.pause(); musicBtn.innerText = "MUSIC: OFF"; }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) container.requestFullscreen?.();
            else document.exitFullscreen();
        }

        function loop() {
            if (!gameActive || isPaused) return;
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            drawWorld(); drawPredators(); drawPlayer();
            update(); requestAnimationFrame(loop);
        }
    </script>
</body>
